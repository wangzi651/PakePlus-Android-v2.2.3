<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<title>橙了吗</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root{
  /* === 液态玻璃配色系统 === */
  --bg-primary: #f8f4f0;
  --bg-secondary: #fff9f5;
  --bg-glass: rgba(255, 255, 255, 0.55);
  --bg-glass-heavy: rgba(255, 255, 255, 0.72);
  --bg-glass-light: rgba(255, 255, 255, 0.35);
  
  --tx-primary: #2d2420;
  --tx-secondary: #7a6b62;
  --tx-muted: #a89a90;
  
  --accent: #e8854d;
  --accent-light: #ffab70;
  --accent-soft: rgba(232, 133, 77, 0.15);
  --accent-glow: rgba(232, 133, 77, 0.35);
  
  --success: #5cb885;
  --success-soft: rgba(92, 184, 133, 0.12);
  --danger: #e86a6a;
  --danger-soft: rgba(232, 106, 106, 0.12);
  
  --border-glass: rgba(255, 255, 255, 0.6);
  --border-subtle: rgba(180, 160, 145, 0.15);
  
  /* 阴影系统 - 彩色柔光 */
  --shadow-sm: 
    0 2px 8px rgba(180, 140, 100, 0.06),
    0 1px 3px rgba(180, 140, 100, 0.04);
  --shadow-md: 
    0 8px 32px rgba(180, 130, 80, 0.10),
    0 2px 8px rgba(180, 130, 80, 0.06),
    0 0 0 1px rgba(255, 255, 255, 0.5) inset;
  --shadow-lg: 
    0 20px 60px rgba(170, 120, 70, 0.12),
    0 8px 24px rgba(170, 120, 70, 0.08),
    0 0 0 1px rgba(255, 255, 255, 0.4) inset;
  --shadow-float:
    0 16px 48px rgba(200, 140, 80, 0.15),
    0 4px 12px rgba(200, 140, 80, 0.08);
  --shadow-accent:
    0 8px 32px var(--accent-glow),
    0 2px 8px rgba(232, 133, 77, 0.2);
  
  --radius-sm: 14px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --radius-xl: 36px;
  --radius-full: 9999px;
  
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font-base: 15px;

  /* === 毛玻璃分级系统 === */
  /* L1：前景主卡片（高亮、厚玻璃） */
  --glass-l1-bg: rgba(255, 255, 255, 0.78);
  --glass-l1-blur: blur(40px) saturate(200%);
  --glass-l1-shadow: 0 20px 60px rgba(170, 120, 70, 0.12), 0 8px 24px rgba(170, 120, 70, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
  --glass-l1-border: 1px solid rgba(255, 255, 255, 0.5);

  /* L2：中景辅助卡片（通透、薄玻璃） */
  --glass-l2-bg: rgba(255, 255, 255, 0.62);
  --glass-l2-blur: blur(28px) saturate(180%);
  --glass-l2-shadow: 0 8px 32px rgba(180, 130, 80, 0.10), 0 2px 8px rgba(180, 130, 80, 0.06), 0 0 0 1px rgba(255, 255, 255, 0.35) inset;
  --glass-l2-border: 1px solid rgba(255, 255, 255, 0.35);

  /* L3：后景容器卡片（沉稳、雾面） */
  --glass-l3-bg: rgba(255, 255, 255, 0.48);
  --glass-l3-blur: blur(20px) saturate(160%);
  --glass-l3-shadow: 0 2px 8px rgba(180, 140, 100, 0.06), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
  --glass-l3-border: 1px solid rgba(255, 255, 255, 0.2);

  /* 轻量元素（按钮、标签、弹窗） */
  --glass-btn-bg: rgba(255, 255, 255, 0.55);
  --glass-btn-blur: blur(20px) saturate(160%);
  --glass-btn-shadow: 0 4px 12px rgba(180, 130, 80, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
}

/* === 全局重置 === */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;outline:none;}
html,body{height:100%;margin:0;font-family:'Inter',-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg-primary);color:var(--tx-primary);overflow:hidden;font-size:var(--font-base);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

/* === Mesh Gradient 背景层 === */
.app{
  height:100%;
  position:relative;
  overflow:hidden;
  background: 
    radial-gradient(ellipse 80% 60% at 10% 20%, rgba(255, 200, 150, 0.25) 0%, transparent 50%),
    radial-gradient(ellipse 60% 50% at 90% 80%, rgba(232, 133, 77, 0.18) 0%, transparent 50%),
    radial-gradient(ellipse 100% 80% at 50% 100%, rgba(255, 220, 180, 0.20) 0%, transparent 55%),
    linear-gradient(165deg, #faf6f2 0%, #f5efe8 30%, #fdf8f3 60%, #f8f0e8 100%);
  background-attachment: fixed;
}

/* 噪点纹理叠加 */
.app::after{
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:0.35;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* 背景图模式 */
.app.has-bg{
  background-color:var(--bg-primary);
  background-image:var(--bg-img);
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
}
.app.has-bg::before{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:var(--bg-overlay,rgba(255,250,245,0.78));
  backdrop-filter:var(--bg-blur, blur(12px)) saturate(140%);
  -webkit-backdrop-filter:var(--bg-blur, blur(12px)) saturate(140%);
}
.app.has-bg::after{display:none;}
.app.has-bg-dk::before{background:var(--bg-overlay,rgba(20,18,15,0.65));}

/* === 视图容器 === */
.view{
  position:relative;z-index:2;
  background:transparent;
  display:none;
  flex-direction:column;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 16px calc(72px + var(--safe-bottom));
  min-height:100vh;
}
.view.on{display:flex;height:100vh;min-height:100vh}

/* ==================== 首页样式 ==================== */

/* 头部区域 */
.hHd{
  padding:16px 0 0;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-shrink:0;
  animation:fadeSlideDown 0.6s ease-out both;
  min-width:0;
}
.hHd>div:first-child{
  flex:1;
  min-width:0;
}

.hDate{
  font-size:0.78rem;
  color:var(--tx-muted);
  font-weight:500;
  letter-spacing:0.02em;
}

.hGreet{
  font-size:1.45rem;
  font-weight:700;
  margin-top:4px;
  letter-spacing:-0.01em;
  background:linear-gradient(135deg, var(--tx-primary) 0%, var(--tx-secondary) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hGreet .emoji{font-size:1em;vertical-align:middle;margin-left:6px}
.hGreet .emoji-small{font-size:0.7em;vertical-align:middle;margin-left:6px}

/* 建议卡片 - 横版长条，居中对齐，单行显示 */
.hSuggestion{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 0.8rem;
  color: var(--tx-secondary);
  line-height: 1.4;
  padding: 12px 16px;
  background: var(--bg-glass);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border-radius: var(--radius-full);
  border: 1px solid var(--border-glass);
  box-shadow: var(--shadow-md);
  margin: 0 0 16px;
  width: 100%;
  box-sizing: border-box;
  position:relative;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  animation:fadeSlideDown 0.6s ease-out 0.1s both;
  text-align:center;
}
.hSuggestion::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
}
.hSuggestion .sIcon{font-size:1rem;flex-shrink:0}
.hSuggestion .sText{white-space:normal;overflow:visible;text-overflow:clip;max-width:100%;line-height:1.4}

/* 徽章 */
.obadge{
  display:flex;
  align-items:center;
  gap:5px;
  background:var(--glass-l2-bg);
  backdrop-filter:var(--glass-l2-blur);
  -webkit-backdrop-filter:var(--glass-l2-blur);
  padding:7px 16px;
  border-radius:var(--radius-full);
  font-size:0.75rem;
  font-weight:600;
  white-space:nowrap;
  flex-shrink:0;
  margin-top:4px;
  border:var(--glass-l2-border);
  box-shadow:var(--glass-l2-shadow);
  animation:fadeSlideDown 0.6s ease-out 0.15s both;
  transition:all 0.3s ease;
  color:var(--accent);
  position:relative;
  overflow:hidden;
}
.obadge::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
}
.obadge:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(232, 133, 77, 0.2);
}
.obadge svg{width:17px;height:17px;flex-shrink:0}

/* 主内容区 */
.dash{
  padding:12px 16px;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:12px;
}

/* 主卡片 - L1前景主卡片（高亮、厚玻璃） */
.mc{
  background:var(--glass-l1-bg);
  backdrop-filter:var(--glass-l1-blur);
  -webkit-backdrop-filter:var(--glass-l1-blur);
  border-radius:var(--radius-xl);
  padding:24px 18px;
  text-align:center;
  position:relative;
  overflow:hidden;
  box-shadow:var(--glass-l1-shadow);
  border:var(--glass-l1-border);
  animation:cardFloatIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s both;
  transition:transform 0.3s ease, box-shadow 0.3s ease;
}
.mc:hover{
  transform:translateY(-4px);
  box-shadow:var(--shadow-float);
}

/* 卡片内部光晕装饰 */
.mc::before{
  content:'';
  position:absolute;
  top:-50px;
  right:-40px;
  width:140px;
  height:140px;
  background:radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
  filter:blur(30px);
  opacity:0.8;
  animation:pulseSoft 4s ease-in-out infinite;
}
.mc::after{
  content:'';
  position:absolute;
  bottom:-30px;
  left:-30px;
  width:100px;
  height:100px;
  background:radial-gradient(circle, rgba(255,200,150,0.2) 0%, transparent 70%);
  filter:blur(25px);
  opacity:0.6;
}

.mcIn{
  position:relative;
  z-index:1;
}

.mcLb{
  font-size:0.82rem;
  color:var(--tx-muted);
  margin-bottom:8px;
  font-weight:500;
  letter-spacing:0.03em;
  text-transform:uppercase;
}

/* 大数字展示 */
.mcW{
  font-size:4rem;
  font-weight:800;
  line-height:1;
  letter-spacing:-0.03em;
  background:linear-gradient(165deg, var(--tx-primary) 30%, var(--accent) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  position:relative;
  display:inline-block;
}
.mcU{
  font-size:1.1rem;
  font-weight:500;
  color:var(--tx-muted);
  margin-left:4px;
  -webkit-text-fill-color:var(--tx-muted);
}

/* 变化标签 */
.mcSub{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:16px;
  font-size:0.82rem;
  flex-wrap:wrap;
}
.dt{
  padding:5px 12px;
  border-radius:var(--radius-full);
  font-weight:600;
  font-size:0.75rem;
  letter-spacing:0.02em;
  transition:all 0.2s ease;
}
.dtD{
  background:var(--success-soft);
  color:var(--success);
  border:1px solid rgba(92,184,133,0.2);
}
.dtU{
  background:var(--danger-soft);
  color:var(--danger);
  border:1px solid rgba(232,106,106,0.2);
}
.dtF{
  background:rgba(180,170,160,0.12);
  color:var(--tx-muted);
  border:1px solid rgba(180,170,160,0.15);
}

.empty{
  color:var(--tx-secondary);
  padding:32px 0;
  animation:fadeIn 0.5s ease 0.3s both;
}
.empty h3{margin:0 0 8px;font-weight:600;font-size:1rem;color:var(--tx-primary)}
.empty p{margin:0;font-size:0.85rem;opacity:0.7;line-height:1.5}

/* 统计网格 */
.sg{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  animation:fadeSlideUp 0.6s ease-out 0.35s both;
}
.sc{
  background:var(--glass-l2-bg);
  backdrop-filter:var(--glass-l2-blur);
  -webkit-backdrop-filter:var(--glass-l2-blur);
  border:var(--glass-l2-border);
  border-radius:var(--radius-md);
  padding:12px 8px;
  text-align:center;
  box-shadow:var(--glass-l2-shadow);
  position:relative;
  overflow:hidden;
  transition:all 0.3s ease;
}
.sc::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
}
.sc:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow-md);
  background:var(--bg-glass-heavy);
}
.scV{
  font-size:1.2rem;
  font-weight:700;
  color:var(--accent);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  letter-spacing:-0.01em;
}
.scL{
  font-size:0.7rem;
  color:var(--tx-muted);
  margin-top:4px;
  font-weight:500;
}

/* 主按钮 - 渐变胶囊 */
.fab{
  width:100%;
  height:54px;
  border-radius:var(--radius-full);
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
  color:#fff;
  border:none;
  font-size:0.95rem;
  font-weight:600;
  cursor:pointer;
  z-index:40;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow-accent);
  animation:fadeSlideUp 0.6s ease-out 0.45s both;
  transition:all 0.3s cubic-bezier(0.22,1,0.36,1);
  letter-spacing:0.01em;
}
.fab::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:var(--radius-full);
  background:linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 60%);
  pointer-events:none;
}
.fab::after{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition:left 0.5s ease;
}
.fab:hover{
  transform:translateY(-3px) scale(1.01);
  box-shadow:0 12px 40px var(--accent-glow), 0 4px 16px rgba(232,133,77,0.25);
}
.fab:hover::after{left:100%}
.fab:active{
  transform:scale(0.97) translateY(0);
  box-shadow:0 4px 16px rgba(232,133,77,0.3);
}

/* ==================== 趋势页样式 ==================== */

.tHd{
  padding:18px 20px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
  animation:fadeSlideDown 0.5s ease-out both;
}
.tTi{
  font-size:1.15rem;
  font-weight:700;
  margin:0;
  letter-spacing:-0.01em;
}

/* 导出按钮 */
.tEx{
  background:var(--bg-glass);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border-glass);
  border-radius:var(--radius-full);
  padding:9px 16px;
  color:var(--tx-secondary);
  font-size:0.8rem;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:0;
  transition:all 0.25s ease;
  box-shadow:var(--shadow-sm);
}
.tEx:hover{
  background:var(--bg-glass-heavy);
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
  color:var(--tx-primary);
}
.tEx svg{width:15px;height:15px;fill:currentColor}

/* 筛选栏 - L3后景容器 */
.fb{
  display:flex;
  gap:8px;
  margin:14px 16px 10px;
  overflow-x:auto;
  overflow-y:visible;
  padding-bottom:4px;
  flex-shrink:0;
  background:var(--glass-l3-bg);
  backdrop-filter:var(--glass-l3-blur);
  -webkit-backdrop-filter:var(--glass-l3-blur);
  border-radius:var(--radius-full);
  padding:12px 18px;
  border:var(--glass-l3-border);
  animation:fadeSlideDown 0.5s ease-out 0.1s both;
  position:relative;
  scroll-behavior:smooth;
}
.fb {
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.35) transparent;
  box-sizing: border-box;
}

.fb::-webkit-scrollbar {
  height: 4px;
}

.fb::-webkit-scrollbar-track {
  background: transparent;
  margin: 0 18px;
  border-radius: var(--radius-full);
}

.fb::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.35);
  border-radius: 10px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.fb::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.5);
}




.fBtn{
  padding:9px 18px;
  border-radius:var(--radius-full);
  background:var(--glass-btn-bg);
  backdrop-filter:var(--glass-btn-blur);
  -webkit-backdrop-filter:var(--glass-btn-blur);
  border:1px solid rgba(255,255,255,0.3);
  font-size:0.8rem;
  font-weight:500;
  color:var(--tx-secondary);
  white-space:nowrap;
  cursor:pointer;
  transition:all 0.25s cubic-bezier(0.22,1,0.36,1);
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.fBtn:hover{
  background:var(--bg-glass-heavy);
  transform:translateY(-2px);
  color:var(--tx-primary);
}
.fBtn.on{
  background:linear-gradient(135deg, var(--accent), var(--accent-light));
  color:#fff;
  border-color:transparent;
  box-shadow:var(--shadow-accent);
  transform:scale(1.02);
  font-weight:600;
}

.cr{
  display:none;
  margin:0 20px 10px;
  gap:8px;
  align-items:center;
  font-size:0.82rem;
  color:var(--tx-secondary);
  flex-shrink:0;
}
.cr.show{display:flex;animation:fadeIn 0.3s ease}
.cr input{
  background:var(--bg-glass);
  backdrop-filter:blur(12px);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius-sm);
  padding:6px 10px;
  color:var(--tx-primary);
  font-size:0.82rem;
  flex:1;
  min-width:0;
  transition:all 0.2s ease;
}
.cr input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}

/* 统计卡片区 */
.tSt{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:10px 16px 16px;
  flex-shrink:0;
  animation:fadeSlideUp 0.5s ease-out 0.15s both;
}
.tSc{
  background:var(--glass-l2-bg);
  backdrop-filter:var(--glass-l2-blur);
  -webkit-backdrop-filter:var(--glass-l2-blur);
  border:var(--glass-l2-border);
  border-radius:var(--radius-md);
  padding:12px 8px;
  text-align:center;
  box-shadow:var(--glass-l2-shadow);
  transition:all 0.3s ease;
}
.tSc:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
}
.tSv{
  font-size:1.08rem;
  font-weight:700;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  color:var(--tx-primary);
}
.tSl{
  font-size:0.68rem;
  color:var(--tx-muted);
  margin-top:3px;
  font-weight:500;
}

/* 图表容器 - L3后景容器 */
.cBox{
  background:var(--glass-l3-bg);
  backdrop-filter:var(--glass-l3-blur);
  -webkit-backdrop-filter:var(--glass-l3-blur);
  border:var(--glass-l3-border);

}

.legend-right{

}

}

}

/* 阶段背景层 */

/* 记录详情面板 */
.detail-panel{position:fixed;bottom:80px;left:16px;right:16px;background:var(--glass-l2-bg);backdrop-filter:var(--glass-l2-blur);-webkit-backdrop-filter:var(--glass-l2-blur);border:var(--glass-l2-border);border-radius:var(--radius-lg);padding:16px 20px;box-shadow:var(--shadow-float);z-index:80;transform:translateY(120%);transition:transform 0.3s cubic-bezier(0.22,1,0.36,1);visibility:hidden}
.detail-panel.show{transform:translateY(0);visibility:visible}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.panel-date{font-size:0.85rem;font-weight:600;color:var(--tx-primary)}
.panel-close{width:28px;height:28px;border:none;background:rgba(255,255,255,0.15);border-radius:50%;color:var(--tx-secondary);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.panel-close:hover{background:rgba(255,255,255,0.25)}
.panel-body{display:flex;flex-direction:column;gap:6px}
.panel-weight{font-size:1.4rem;font-weight:700;color:var(--tx-primary)}
.panel-change{font-size:0.8rem;color:var(--tx-muted)}
.panel-note{font-size:0.8rem;color:var(--tx-secondary);margin-top:4px;padding-top:8px;border-top:1px solid var(--border-subtle)}

/* ========== 热力图 CSS ========== */
.cal-card {
  background: var(--glass-l3-bg);
  backdrop-filter: var(--glass-l3-blur);
  -webkit-backdrop-filter: var(--glass-l3-blur);
  border-radius: var(--radius-lg);
  padding: 12px 8px;
  margin: 16px 16px;
  border: 1px solid var(--border-glass);
  width: auto;
  box-sizing: border-box;
  overflow: visible;
  flex-shrink: 0;
  position: relative;
  animation: fadeSlideUp 0.5s ease-out 0.3s both;
  z-index: 1;
}
.cal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.cal-title { font-weight: 600; font-size: 1rem; color: var(--tx-primary); }
.cal-nav { display: flex; gap: 16px; }
.cal-arrow { font-size: 1.3rem; cursor: pointer; color: var(--tx-secondary); }
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 0.7rem;
  color: var(--tx-muted);
  margin-bottom: 6px;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  max-width: 100%;
  overflow: visible;
  box-sizing: border-box;
}
.cal-cell {
  aspect-ratio: 5 / 6;
  background: transparent;
  border-radius: 14px;
  padding: 2px 1px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  border: 1px solid transparent;
  transition: 0.15s;
  box-sizing: border-box;
  width: 100%;
  max-width: 100%;
  overflow: hidden;
}

.cal-cell.has-data.cal-up {
  background: rgba(232, 106, 106, 0.25) !important;
}

.cal-cell.has-data.cal-down {
  background: rgba(92, 184, 133, 0.15) !important;
}

.cal-date {
  font-size: 0.55rem;
  color: var(--tx-muted);
  margin-top: 2px;
  line-height: 1.2;
  text-align: center;
  width: 100%;
}

.cal-change {
  font-size: clamp(0.4rem, 2vw, 0.52rem);
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1px;
  white-space: nowrap;
  line-height: 1.1;
  width: 100%;
  text-align: center;
  margin-bottom: 2px;
  letter-spacing: -0.02em;
}

.cal-change.up { color: #c03030; }

.cal-change.down { color: #1a7a4a; }

/* 经期标记弹出层 */
.phase-popup{position:fixed;bottom:-100%;left:0;right:0;background:var(--glass-l2-bg);backdrop-filter:var(--glass-l2-blur);-webkit-backdrop-filter:var(--glass-l2-blur);border:var(--glass-l2-border);border-radius:24px 24px 0 0;padding:20px;z-index:100;transition:bottom 0.3s cubic-bezier(0.22,1,0.36,1)}
.phase-popup.show{bottom:0}
.phase-popup::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:36px;height:4px;background:var(--border-subtle);border-radius:2px}

/* 弹出层 */


.hlHeader {

  align-items: center;
  justify-content: space-between;

}

.hlTip {

.hl{padding:0 20px 20px 18px;display:block}

/* 历史记录项 */
.hi{

.hiIn{

}
.hiL{
  display:flex;align-items:center;gap:6px;

}
.hiDt{
  font-size:0.84rem;

/* ==================== 键盘弹窗 ==================== */

.ko{
  position:fixed;

}

@keyframes fadeSlideDown {

@keyframes fadeSlideUp {

}

@keyframes fadeIn {

@keyframes cardFloatIn {

@keyframes slideInRight {

function genPal(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const mx=(a,b,t)=>a.map((v,i)=>Math.round(v+(b[i]-v)*t));
  const W=[255,255,255],Bk=[30,26,22];
  return{bg:'rgb('+mx([r,g,b],W,.94)+')',bgC:'rgb('+mx([r,g,b],W,.98)+')',tx:'rgb('+mx([r,g,b],Bk,.52)+')',mt:'rgb('+mx([r,g,b],[140,125,110],.55)+')',ln:'rgb('+mx([r,g,b],[180,160,140],.18)+')',ac:hex,acL:'rgb('+mx([r,g,b],W,.85)+')',dk:0};
}

function applySk(n,chx){
  const s=n==='custom'&&chx?genPal(chx):(SK[n]||SK.orange);
  const r=document.documentElement.style;
  r.setProperty('--bg-primary',s.bg);
  r.setProperty('--bg-secondary',s.bgC);
  r.setProperty('--bg-glass','rgba(255,255,255,0.55)');
  r.setProperty('--bg-glass-heavy','rgba(255,255,255,0.72)');
  r.setProperty('--bg-glass-light','rgba(255,255,255,0.35)');
  r.setProperty('--tx-primary',s.tx);
  r.setProperty('--tx-secondary',s.mt);
  r.setProperty('--tx-muted',s.mt);
  r.setProperty('--accent',s.ac);
  r.setProperty('--accent-light',s.ac);
  r.setProperty('--accent-soft',s.acL);
  r.setProperty('--accent-glow',s.ac+'66');
  r.setProperty('--success','#5cb885');
  r.setProperty('--success-soft','rgba(92,184,133,0.12)');
  r.setProperty('--danger','#e86a6a');
  r.setProperty('--danger-soft','rgba(232,106,106,0.12)');
  r.setProperty('--border-subtle',s.ln);
  
  if(s.dk){
    r.setProperty('--glass-l1-bg','rgba(30,26,22,0.78)');
    r.setProperty('--glass-l2-bg','rgba(30,26,22,0.62)');
    r.setProperty('--glass-l3-bg','rgba(30,26,22,0.48)');
    r.setProperty('--glass-btn-bg','rgba(30,26,22,0.55)');

    r.setProperty('--glass-l1-bg','rgba(255,255,255,0.78)');
    r.setProperty('--glass-l2-bg','rgba(255,255,255,0.62)');
    r.setProperty('--glass-l3-bg','rgba(255,255,255,0.48)');

function applyBg(url){
  if(!url){
    document.documentElement.style.removeProperty('--bg-img');
    $('#app').classList.remove('has-bg','has-bg-dk');
    db.bg=null;ST.s(db);return;
  }
  document.documentElement.style.setProperty('--bg-img','url("'+url+'")');
  const s=SK[db.sk]||SK.orange;
  $('#app').classList.add('has-bg');
  $('#app').classList.toggle('has-bg-dk',!!s.dk);
  db.bg=url;ST.s(db);
  updateBgSettings();
  bindSliderEvents();
}

function bindSliderEvents(){
  const blurSlider = $('#bgBlurSlider');
  const opacitySlider = $('#bgOpacitySlider');
  
  if(blurSlider){
    blurSlider.oninput = e => {
      const val = parseFloat(e.target.value);
      db.pf.bgBlur = val;
      document.documentElement.style.setProperty('--bg-blur', `blur(${val}px)`);
      $('#blurValue').innerText = val + 'px';
      ST.s(db);
    };
  }
  
  if(opacitySlider){
    opacitySlider.oninput = e => {
      const val = parseFloat(e.target.value);
      db.pf.bgOpacity = val;
      const s=SK[db.sk]||SK.orange;
      const alpha=val/100;
      const overlay=s.dk?`rgba(20,18,15,${alpha})`:`rgba(255,250,245,${alpha})`;
      document.documentElement.style.setProperty('--bg-overlay',overlay);
      $('#opacityValue').innerText = val + '%';
      ST.s(db);
    };
  }
}

function handleBgUpload(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{const url=e.target.result;applyBg(url);updateBgThumb(url);inp.value='';};r.readAsDataURL(f);
}

function updateBgSettings(){
  const blur=db.pf.bgBlur??5;
  const opacity=db.pf.bgOpacity??82;
  const s=SK[db.sk]||SK.orange;
  const alpha=opacity/100;
  const overlay=s.dk?`rgba(20,18,15,${alpha})`:`rgba(255,250,245,${alpha})`;
  document.documentElement.style.setProperty('--bg-overlay',overlay);
  document.documentElement.style.setProperty('--bg-blur','blur('+blur+'px)');
  if($('#blurValue'))$('#blurValue').innerText=blur+'px';
  if($('#opacityValue'))$('#opacityValue').innerText=opacity+'%';
}

    suggestion='新的一天，先上秤看看身体的小变化吧';

  }else if(time>=9&&time<12){
    greet='上午好 <span class="emoji" style="-webkit-text-fill-color: currentColor; background: none;">🌤️</span>';
    suggestion='记得多喝水，为代谢加把劲';

    suggestion='午餐多吃蛋白质，帮你维持饱腹感';

    greet='下午好 <span class="emoji" style="-webkit-text-fill-color: currentColor; background: none;">🌤️</span>';
    suggestion='久坐后起来活动5分钟，避免脂肪堆积';
    suggestionIcon='🚶';
  }else if(time>=17&&time<19){
    greet='傍晚好 <span class="emoji" style="-webkit-text-fill-color: currentColor; background: none;">🌅</span>';
    suggestion='今天的运动计划完成了吗？';
    suggestionIcon='🏃';
  }else if(time>=19&&time<22){
    greet='晚上好 <span class="emoji emoji-small" style="-webkit-text-fill-color: currentColor; background: none;">🌙</span>';
    suggestion='睡前别吃高热量食物，给身体减负';
    suggestionIcon='🍎';
  }else{
    greet='夜深了 <span class="emoji-small" style="-webkit-text-fill-color: currentColor; background: none;">🌛</span>';
    suggestion='早点休息，睡眠也是体重管理的关键哦';
    suggestionIcon='😴';
  }
  $('#hGr').innerHTML=greet;
  $('#hDt').innerText=now.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'});
  
  const dashElement = document.querySelector('.dash');
  let suggestionElement = document.querySelector('.hSuggestion');
  
  if(suggestionElement){
    suggestionElement.innerHTML='<span class="sIcon">'+suggestionIcon+'</span><span class="sText">'+suggestion+'</span>';
    if(suggestionElement.parentNode !== dashElement){
      dashElement.insertBefore(suggestionElement, dashElement.firstChild);
    }
  } else {
    suggestionElement = document.createElement('div');
    suggestionElement.className = 'hSuggestion';
    suggestionElement.innerHTML='<span class="sIcon">'+suggestionIcon+'</span><span class="sText">'+suggestion+'</span>';
    dashElement.insertBefore(suggestionElement, dashElement.firstChild);
  }
  const rs=db.recs.sort((a,b)=>a.date.localeCompare(b.date));
  const today=ISO(now);
  const tr=rs.filter(r=>ISO(new Date(r.date))===today);
  if(!tr.length){$('#mcIn').innerHTML='<div class="empty"><h3>今天还未记录</h3><p style="margin-top:10px">点击下方按钮开始记录</p></div>';$('#sGrid').style.display='none';return;}
  const lt=tr[tr.length-1],u=db.pf.u,uf=u==='jin'?2:1,dw=(lt.w*uf).toFixed(1);
  const yd=new Date(now);yd.setDate(yd.getDate()-1);
  const yesterday=ISO(yd);
  const yr=rs.filter(r=>ISO(new Date(r.date))===yesterday);
  let dh='<span class="dt dtF">首次记录</span>';
  if(yr.length){const d=lt.w-yr[yr.length-1].w,dd=(d*uf).toFixed(1);if(d<-.05)dh='<span class="dt dtD">↓'+Math.abs(dd)+' '+u+'</span>';else if(d>.05)dh='<span class="dt dtU">↑'+dd+' '+u+'</span>';else dh='<span class="dt dtF">持平</span>';}
  let th='';
  if(db.pf.tg>0){const d=lt.w-db.pf.tg,dd=(d*uf).toFixed(1);th=d<=.05?'<span>已达目标 🎉</span>':'<span style="color:var(--danger)">距目标 '+dd+' '+u+'</span>';}

  $('#s2').innerText=stk+'天';
  const ms=new Date(now.getFullYear(),now.getMonth(),1);const mr=rs.filter(r=>new Date(r.date)>=ms);
  const mm=mr.length?Math.min(...mr.map(r=>r.w)):null;
  $('#s3').innerText=mm!==null?(mm*uf).toFixed(1):'--';
}

/* Canvas绘图 - 圆角矩形辅助 */
function rRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawC(rs){
  const cv=$('#cvs'),ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1;
  const parent=cv.parentElement;
  const w=parent.clientWidth;
  const H=220;
  cv.width=w*dpr;cv.height=H*dpr;cv.style.width='100%';cv.style.height=H+'px';ctx.scale(dpr,dpr);
  const cs=getComputedStyle(document.documentElement);
  const cA=cs.getPropertyValue('--accent').trim();
  const cL=cs.getPropertyValue('--border-subtle').trim();
  const cM=cs.getPropertyValue('--tx-muted').trim();
  const cD=cs.getPropertyValue('--danger').trim();
  const isRedSkin=['coral','sakura','peach','sunset','rose'].includes(db.sk);
  const targetColor=isRedSkin?'#5cb885':cD;
  ctx.clearRect(0,0,w,H);
  
  if(rs.length<2){
    ctx.fillStyle=cM;
    ctx.font='500 14px Inter, sans-serif';
    ctx.textAlign='center';
    ctx.fillText('至少需要两条记录',w/2,H/2);
    return;
  }
  
  let pl=rs;
  if(pl.length>50){
    const m={};
    rs.forEach(r=>{
      const d=new Date(r.date);
      const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      if(!m[k])m[k]=[];
      m[k].push(r.w);
    });
    pl=[];
    for(const k in m){
      pl.push({date:k+'-15',w:m[k].reduce((a,b)=>a+b,0)/m[k].length});
    }
  }
  
  const vs=pl.map(r=>r.w);
  let mn=Math.min(...vs),mx=Math.max(...vs);
  const tg=db.pf.tg;
  
  if(tg>0){
    mn=Math.min(mn,tg);
    mx=Math.max(mx,tg);
  }
  const range=mx-mn||1;
  mn=mn-range*0.1;
  mx=mx+range*0.1;
  
  const pL=40,pR=12,pT=18,pB=32;
  const cw=w-pL-pR,ch=H-pT-pB;
  const gx=i=>pL+(i/(pl.length-1))*cw,gy=v=>pT+(1-(v-mn)/(mx-mn))*ch;
  const isDarkMode = document.querySelector('.app')?.classList.contains('has-bg-dk');
  
  drawPhases(ctx, pl, pL, pT, cw, ch);
  
  ctx.strokeStyle = isDarkMode ? 'rgba(255, 255, 255, 0.15)' : 'rgba(180, 160, 145, 0.15)';
  ctx.lineWidth = 0.8;
  ctx.setLineDash([4, 6]);
  for(let i=0;i<=4;i++){
    const y=pT+(ch/4)*i;
    ctx.beginPath();
    ctx.moveTo(pL+5,y);
    ctx.lineTo(pL+cw-5,y);
    ctx.stroke();
    const v=mx-((mx-mn)/4)*i;
    ctx.fillStyle=cM;
    ctx.font='500 11px Inter, sans-serif';
    ctx.textAlign='right';
    ctx.fillText(v.toFixed(1),pL-12,y+4);
  }
  ctx.setLineDash([]);
  
  if(tg>0&&tg>=mn&&tg<=mx){
    const ty=gy(tg);
    ctx.strokeStyle=targetColor;ctx.lineWidth=1.5;ctx.setLineDash([7,4]);
    ctx.beginPath();ctx.moveTo(pL,ty);ctx.lineTo(pL+cw,ty);ctx.stroke();
    ctx.setLineDash([]);
    const label='目标 '+tg.toFixed(1);
    const textWidth=ctx.measureText(label).width;
    let labelX=pL+cw-textWidth-8;
    let labelY=ty-6;
    if(ty<pT+30)labelY=ty+16;
    ctx.fillStyle='rgba(255,255,255,0.75)';
    rRect(ctx,labelX-4,labelY-13,textWidth+8,17,4);ctx.fill();
    ctx.fillStyle=targetColor;ctx.font='600 10px Inter, sans-serif';ctx.textAlign='left';
    ctx.fillText(label,labelX,labelY);
  }
  
  const pts=pl.map((r,i)=>({x:gx(i),y:gy(r.w)}));
  
  const grad=ctx.createLinearGradient(0,pT,0,pT+ch);
  grad.addColorStop(0,cA+'30');
  grad.addColorStop(1,cA+'05');
  
  function drawArea(points){
    ctx.beginPath();
    ctx.moveTo(points[0].x,points[0].y);
    for(let i=0;i<points.length-1;i++){
      const p0=points[i-1]||points[i];
      const p1=points[i];
      const p2=points[i+1];
      const p3=points[i+2]||p2;
      const cp1x=p1.x+(p2.x-p0.x)/6;
      const cp1y=p1.y+(p2.y-p0.y)/6;
      const cp2x=p2.x-(p3.x-p1.x)/6;
      const cp2y=p2.y-(p3.y-p1.y)/6;
      ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2.x,p2.y);
    }
    ctx.lineTo(points[points.length-1].x,pT+ch);
    ctx.lineTo(points[0].x,pT+ch);
    ctx.closePath();
    ctx.fillStyle=grad;ctx.fill();
  }
  
  function drawSmoothLine(points){
    if (points.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[i - 1] || points[i];
      const p1 = points[i];
      const p2 = points[i + 1];
      const p3 = points[i + 2] || p2;
      
      const cp1x = p1.x + (p2.x - p0.x) / 6;
      const cp1y = p1.y + (p2.y - p0.y) / 6;
      const cp2x = p2.x - (p3.x - p1.x) / 6;
      const cp2y = p2.y - (p3.y - p1.y) / 6;
      
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
    }
    
    ctx.strokeStyle = cA;
    ctx.lineWidth = 2.8;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  
  drawSmoothLine(pts);
  
  const nodeAccent = isRedSkin ? '#5cb885' : cA;
  const isLongRange = ['month', 'half', 'year', 'all', 'custom'].includes(cR);
  
  pts.forEach((p, i) => {
    if (isLongRange && i !== 0 && i !== pl.length - 1) return;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5.5, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3.5, 0, 2 * Math.PI);
    ctx.fillStyle = nodeAccent;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.2, 0, 2 * Math.PI);
    ctx.fillStyle = '#fff';
    ctx.fill();
  });
  
  // 如果十字线激活，绘制十字线
  if (crosshair.active && crosshair.dataIndex >= 0 && crosshair.dataIndex < pts.length) {
    drawCrosshair(ctx, pts[crosshair.dataIndex], pL, pT, cw, ch);
  }
  
  window.chartPoints = pts;
  window.chartData = pl;
  
  ctx.fillStyle=cM;ctx.font='500 10px Inter, sans-serif';ctx.textBaseline='top';
  
  if (cR === 'week' || pl.length < 2) {
    // 近一周或数据点不足2个，保持原有逻辑
    const labelCount=6;
    let step=pl.length<=labelCount?1:Math.floor((pl.length-1)/(labelCount-1));
    
    for(let i=0;i<pl.length;i++){
      if(i%step===0||i===pl.length-1){
        const d=new Date(pl[i].date);
        const label=(d.getMonth()+1)+'/'+d.getDate();
        const x=gx(i);
        if(i===0)ctx.textAlign='left';
        else if(i===pl.length-1)ctx.textAlign='right';
        else ctx.textAlign='center';
        ctx.fillText(label,x,pT+ch+14);
      }
    }
  } else {
    // 其他时间范围，使用基于时间均匀分布的策略
    const startTime = new Date(pl[0].date).getTime();
    const endTime = new Date(pl[pl.length - 1].date).getTime();
    const timeSpan = endTime - startTime;
    const step = timeSpan / 5;
    
    // 生成6个目标时间戳
    const targetTimes = [];
    for (let i = 0; i <= 5; i++) {
      targetTimes.push(startTime + i * step);
    }
    
    // 对每个目标时间戳，找到最接近的数据点并绘制标签
    targetTimes.forEach((targetTime, index) => {
      // 二分查找最接近的记录
      let closestIndex = 0;
      let minDiff = Math.abs(new Date(pl[0].date).getTime() - targetTime);
      
      for (let i = 1; i < pl.length; i++) {
        const currentTime = new Date(pl[i].date).getTime();
        const diff = Math.abs(currentTime - targetTime);
        if (diff < minDiff) {
          minDiff = diff;
          closestIndex = i;
        }
      }
      
      // 计算标签位置
      const x = pL + ((targetTime - startTime) / timeSpan) * cw;
      
      // 确定显示的日期
      let displayDate;
      const closestTime = new Date(pl[closestIndex].date).getTime();
      const tolerance = 2 * 24 * 60 * 60 * 1000; // 2天容差
      
      if (Math.abs(closestTime - targetTime) <= tolerance) {
        // 使用最接近的记录的日期
        displayDate = new Date(pl[closestIndex].date);
      } else {
        // 使用目标时间的日期
        displayDate = new Date(targetTime);
      }
      
      const label = (displayDate.getMonth() + 1) + '/' + displayDate.getDate();
      
      // 设置文本对齐方式
      if (index === 0) {
        ctx.textAlign = 'left';
      } else if (index === 5) {
        ctx.textAlign = 'right';
      } else {
        ctx.textAlign = 'center';
      }
      
      ctx.fillText(label, x, pT + ch + 14);
    });
  }
  
  const legend = document.getElementById('chartLegend');
  const targetLegendItem = legend.querySelector('.legend-left .legend-item:nth-child(2)');
  if(tg>0){
    targetLegendItem.style.display = 'flex';
  } else {
    targetLegendItem.style.display = 'none';
  }
}

function drawPhases(ctx, pl, pL, pT, cw, ch){
  if(!db.phases || db.phases.length === 0) return;
  
  const startDate = new Date(pl[0].date);
  const endDate = new Date(pl[pl.length - 1].date);
  const totalDays = (endDate - startDate) / (1000 * 60 * 60 * 24);
  if(totalDays <= 0) return;
  
  db.phases.forEach(phase => {
    const phaseStart = new Date(phase.start);
    const phaseEnd = new Date(phase.end);
    
    if(phaseEnd < startDate || phaseStart > endDate) return;
    
    const startPos = Math.max(0, (phaseStart - startDate) / (1000 * 60 * 60 * 24) / totalDays);
    const endPos = Math.min(1, (phaseEnd - startDate) / (1000 * 60 * 60 * 24) / totalDays);
    
    const x1 = pL + startPos * cw;
    const x2 = pL + endPos * cw;
    const width = x2 - x1;
    
    const color = phase.type === 'period' ? 'rgba(232, 106, 106, 0.2)' : 'rgba(74, 172, 255, 0.2)';
    const textColor = phase.type === 'period' ? 'rgba(232, 106, 106, 0.6)' : 'rgba(74, 172, 255, 0.6)';
    const label = phase.type === 'period' ? '经期' : (phase.name || '自定义');
    
    ctx.fillStyle = color;
    ctx.fillRect(x1, pT, width, ch);
    
    if(width > 30) {
      ctx.fillStyle = textColor;
      ctx.font = '500 10px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(label, x1 + width/2, pT + 16);
    }
  });
}

function findPointOnLine(x, y, points) {
  // 检测点击是否在折线上
  for (let i = 0; i < points.length - 1; i++) {
    const p1 = points[i];
    const p2 = points[i + 1];
    
    // 计算点到线段的距离
    const dist = distanceToLine(x, y, p1.x, p1.y, p2.x, p2.y);
    
    // 如果距离小于10像素，认为点击在折线上
    if (dist < 10) {
      // 返回线段的起点索引
      return i;
    }
  }
  return -1;
}

function distanceToLine(x, y, x1, y1, x2, y2) {
  // 计算点到线段的距离
  const A = x - x1;
  const B = y - y1;
  const C = x2 - x1;
  const D = y2 - y1;
  
  const dot = A * C + B * D;
  const lenSq = C * C + D * D;
  let param = -1;
  
  if (lenSq !== 0) {
    param = dot / lenSq;
  }
  
  let xx, yy;
  
  if (param < 0) {
    xx = x1;
    yy = y1;
  } else if (param > 1) {
    xx = x2;
    yy = y2;
  } else {
    xx = x1 + param * C;
    yy = y1 + param * D;
  }
  
  const dx = x - xx;
  const dy = y - yy;
  return Math.sqrt(dx * dx + dy * dy);
}

function drawCrosshair(ctx, point, pL, pT, cw, ch) {
  ctx.save();
  ctx.strokeStyle = 'rgba(232,133,77,0.6)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  // 垂直线
  ctx.beginPath();
  ctx.moveTo(point.x, pT);
  ctx.lineTo(point.x, pT + ch);
  ctx.stroke();
  // 水平线
  ctx.beginPath();
  ctx.moveTo(pL, point.y);
  ctx.lineTo(pL + cw, point.y);
  ctx.stroke();
  ctx.setLineDash([]);
  // 高亮节点
  ctx.beginPath();
  ctx.arc(point.x, point.y, 7, 0, 2 * Math.PI);
  ctx.fillStyle = 'rgba(232,133,77,0.2)';
  ctx.fill();
  ctx.restore();
}

function createAppModal(options) {

  const modal = document.createElement('div');
  modal.className = 'modal-content';
  modal.style.cssText = 'background:rgba(255, 255, 255, 0.95);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid var(--border-glass);border-radius:var(--radius-lg);padding:24px;min-width:280px;max-width:90vw;box-shadow:var(--shadow-lg);z-index:301;position:relative';
  if (document.querySelector('.app')?.classList.contains('has-bg-dk')) {
    modal.style.background = 'rgba(30, 26, 22, 0.92)';
  }
  
  if (title) {
    const titleElement = document.createElement('div');
    titleElement.style.cssText = 'font-size:1.05rem;font-weight:700;text-align:center;margin-bottom:18px;color:var(--tx-primary)';
    titleElement.textContent = title;
    modal.appendChild(titleElement);
  }
  
  if (content) {
    const contentElement = document.createElement('div');
    contentElement.style.cssText = 'margin-bottom:16px';
    if (typeof content === 'string') {
      contentElement.innerHTML = content;
    } else {
      contentElement.appendChild(content);
    }
    modal.appendChild(contentElement);
  }
  
  if (buttons.length > 0) {
    const buttonsContainer = document.createElement('div');
    buttonsContainer.style.cssText = 'display:flex;flex-direction:column;gap:10px';
    
    buttons.forEach(button => {
      const buttonElement = document.createElement('button');
      buttonElement.style.cssText = button.style || 'padding:12px 16px;border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--bg-glass);color:var(--tx-primary);font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.2s ease';
      buttonElement.textContent = button.text;
      buttonElement.onclick = button.onClick;
      buttonsContainer.appendChild(buttonElement);
    });
    
    modal.appendChild(buttonsContainer);
  }
  
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  
  const close = () => {
    if (onClose) onClose();
    overlay.remove();
  };
  
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
      close();
    }
  });
  
  return {
    show: () => {
      overlay.style.display = 'flex';
    },
    hide: close,
    destroy: close,
    modalElement: modal
  };
}



// ========== 热力图 JavaScript ==========
let displayYear = new Date().getFullYear();
let displayMonth = new Date().getMonth(); // 0-11

// 渲染日历
function renderCalendar() {
  const year = displayYear, month = displayMonth;
  
  // 构建按日期升序排序的记录数组
  const sortedRecs = [...db.recs].sort((a, b) => new Date(a.date) - new Date(b.date));
  
  // 构建映射
  const recordMap = new Map(); // 日期字符串 -> 当日最后一条记录
  const dateToIndex = new Map(); // 日期字符串 -> 该日期在 sortedRecs 中的索引
  
  sortedRecs.forEach((r, index) => {
    const dateStr = r.date.split('T')[0];
    recordMap.set(dateStr, r);
    // 只记录该日期的第一个索引
    if (!dateToIndex.has(dateStr)) {
      dateToIndex.set(dateStr, index);
    }
  });
  
  console.log('热力图数据:', recordMap);
  console.log('显示月份:', year, month+1);
  
  $('#calTitle').innerText = `${year}年${month+1}月`;
  
  const firstDay = new Date(year, month, 1);
  let startDayOfWeek = firstDay.getDay() || 7; // 周一=1，周日=7
  const daysInMonth = new Date(year, month+1, 0).getDate();
  
  let cells = [];
  for (let i = 1; i < startDayOfWeek; i++) cells.push(null); // 前置空白
  
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const record = recordMap.get(dateStr);
    cells.push({ day: d, date: dateStr, record });
  }
  
  let html = '';
  cells.forEach(cell => {
    if (!cell) {
      html += `<div class="cal-cell"></div>`;
    } else {
      const hasData = !!cell.record;
      let changeHtml = '';
      let cellClass = 'cal-cell';

      if (hasData) {
        const idx = dateToIndex.get(cell.date);
        const prevRecord = idx > 0 ? sortedRecs[idx - 1] : null;

        if (prevRecord) {
          const diff = cell.record.w - prevRecord.w;
          const diffVal = (diff * (db.pf.u === 'jin' ? 2 : 1)).toFixed(1);
          const isUp = diff > 0;
          const isDown = diff < 0;
          
          if (diff === 0) {
            changeHtml = `<span class="cal-change" style="color:var(--tx-muted);">—</span>`;
          } else {
            const arrow = isUp ? '↑' : '↓';
            const changeClass = isUp ? 'up' : 'down';
            changeHtml = `<span class="cal-change ${changeClass}">${arrow} ${Math.abs(diffVal)}</span>`;
            cellClass += isUp ? ' cal-up' : ' cal-down';
          }
        } else {
          changeHtml = `<span class="cal-change" style="color:var(--tx-muted);">—</span>`;
        }
        cellClass += ' has-data';
      }

      html += `<div class="${cellClass}" data-date="${cell.date}">
        <span class="cal-date">${cell.day}</span>
        ${changeHtml}
      </div>`;
    }
  });
  
  console.log('热力图HTML:', html);
  $('#calGrid').innerHTML = html;
  
  // 绑定格子点击事件
  $$('.cal-cell.has-data').forEach(el => {
    el.addEventListener('click', () => {
      const dateStr = el.dataset.date;
      const record = recordMap.get(dateStr);
      if (record) {
        const index = db.recs.findIndex(r => r.id === record.id);
        showDetailPanel(record, index);
      }
    });
  });
}

function prevMonth() {
  displayMonth--;
  if (displayMonth < 0) { displayMonth = 11; displayYear--; }
  renderCalendar();
}

function nextMonth() {
  displayMonth++;
  if (displayMonth > 11) { displayMonth = 0; displayYear++; }
  renderCalendar();
}

  const beforeCount = db.phases ? db.phases.length : 0;
  db.phases = db.phases.filter(phase => phase.id !== id && String(phase.id) !== String(id));
  const afterCount = db.phases.length;

  ST.s(db);
  renderT();
  toast('已删除');

/* 通用数据导入模块 */
function trim(str) {
  if (typeof str !== 'string') return '';
  return str.trim();
}

function isXlsxBuffer(buffer) {
  if (buffer.length < 4) return false;
  return buffer[0] === 0x50 && buffer[1] === 0x4B;
}

function detectDelimiter(text) {
  const firstLine = text.split('\n')[0];
  const delimiters = [',', ';', '\t', '|'];
  let maxCount = 0;
  let detected = ',';
  
  for (const d of delimiters) {
    const count = (firstLine.match(new RegExp(d === '|' ? '\\|' : d, 'g')) || []).length;
    if (count > maxCount) {
      maxCount = count;
      detected = d;
    }
  }
  
  return detected;
}

function parseDate(dateStr) {
  if (!dateStr) return null;
  const s = trim(String(dateStr));
  
  let match = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if (match) {
    const [, y, m, d] = match;
    const date = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
    if (!isNaN(date)) return date.toISOString().split('T')[0];
  }
  
  match = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
  if (match) {
    const [, a, b, y] = match;
    const date = new Date(parseInt(y), parseInt(a) - 1, parseInt(b));
    if (!isNaN(date)) return date.toISOString().split('T')[0];
  }
  
  const num = parseFloat(s);
  if (!isNaN(num) && num > 25569 && num < 50000) {
    const date = new Date((num - 25569) * 86400 * 1000);
    if (!isNaN(date)) return date.toISOString().split('T')[0];
  }
  
  const date = new Date(s);
  if (!isNaN(date)) return date.toISOString().split('T')[0];
  
  return null;
}

function parseWeight(weightStr) {
  if (weightStr === null || weightStr === undefined) return NaN;
  let s = trim(String(weightStr));
  s = s.replace(/kg|千克|公斤|斤|jin|g|克/g, '');
  s = s.trim();
  const value = parseFloat(s);
  if (isNaN(value) || value <= 0) return NaN;
  if (s.includes('斤') || s.includes('jin')) return value / 2;
  return value;
}

const DATE_FIELD_PATTERNS = ['date', '日期', '时间', '记录时间', 'day', 'daytime', 'record_date', 'timestamp'];
const WEIGHT_FIELD_PATTERNS = ['weight', '体重', '斤', 'kg', 'w', '质量', '分量'];
const NOTE_FIELD_PATTERNS = ['note', '备注', 'remark', 'memo', 'comment', 'comments', '说明'];

function matchField(fieldName, patterns) {
  if (!fieldName) return false;
  const s = trim(String(fieldName)).toLowerCase();
  return patterns.some(p => s.includes(p.toLowerCase()));
}

function detectFields(headers) {
  const detected = { date: -1, weight: -1, note: -1 };
  headers.forEach((header, index) => {
    if (!header) return;
    const s = trim(String(header)).toLowerCase();
    if (detected.date === -1 && matchField(s, DATE_FIELD_PATTERNS)) detected.date = index;
    if (detected.weight === -1 && matchField(s, WEIGHT_FIELD_PATTERNS)) detected.weight = index;
    if (detected.note === -1 && matchField(s, NOTE_FIELD_PATTERNS)) detected.note = index;
  });
  if (detected.date === -1 && headers.length >= 1) detected.date = 0;
  if (detected.weight === -1 && headers.length >= 2) detected.weight = 1;
  return detected;
}

function normalizeRecord(row, fields) {
  const dateStr = fields.date >= 0 ? row[fields.date] : row[0];
  const weightStr = fields.weight >= 0 ? row[fields.weight] : row[1];
  const noteStr = fields.note >= 0 && fields.note < row.length ? row[fields.note] : '';
  const date = parseDate(dateStr);
  const weight = parseWeight(weightStr);
  if (!date || isNaN(weight)) return null;
  return { date, weight, note: trim(noteStr), tag: '' };
}

function deduplicateRecords(records) {
  const seen = new Set();
  return records.filter(r => {
    const key = r.date + '|' + r.weight;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const delimiter = detectDelimiter(text);
  const lines = text.split(/\r?\n/).filter(line => trim(line).length > 0);
  if (lines.length === 0) throw new Error('CSV文件为空');
  
  function parseLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') {
        if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
        else { inQuotes = !inQuotes; }
      } else if (char === delimiter && !inQuotes) {
        result.push(current);
        current = '';
      } else {
        current += char;
      }
    }
    result.push(current);
    return result;
  }
  
  return lines.map(line => parseLine(line));
}

function parseXLSX(arrayBuffer) {
  const data = new Uint8Array(arrayBuffer);
  const workbook = XLSX.read(data, { type: 'array', cellDates: true });
  for (const sheetName of workbook.SheetNames) {
    const worksheet = workbook.Sheets[sheetName];
    const json = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
    if (json.length > 1) return json;
  }
  throw new Error('未找到有效数据表');
}

function parseAsText(arrayBuffer) {
  const encodings = ['utf-8', 'gbk', 'gb2312', 'big5'];
  for (const encoding of encodings) {
    try {
      const decoder = new TextDecoder(encoding);
      const text = decoder.decode(arrayBuffer);
      if (text.includes('\n') || text.includes(',')) return parseCSV(text);
    } catch (e) { continue; }
  }
  throw new Error('无法解析文件编码');
}

function importData(buffer, ext, fileName) {
  let rawData = [];
  
  try {
    if (ext === 'json') {
      const text = typeof buffer === 'string' ? buffer : new TextDecoder().decode(buffer);
      const json = JSON.parse(text);
      if (Array.isArray(json)) {
        rawData = json.map(r => [r.date, r.weight, r.note || '', r.tag || '']);
      } else if (json.data && Array.isArray(json.data)) {
        rawData = json.data.map(r => [r.date, r.weight, r.note, r.tag]);
      } else {
        return { success: false, error: 'INVALID_JSON', message: 'JSON格式不正确' };
      }
    } else if (['xlsx', 'xls', 'et'].includes(ext)) {
      try { rawData = parseXLSX(buffer); }
      catch (xlsxErr) { rawData = parseAsText(buffer); }
    } else {
      const uint8Array = new Uint8Array(buffer);
      if (isXlsxBuffer(uint8Array)) {
        try { rawData = parseXLSX(buffer); }
        catch (xlsxErr) { rawData = parseAsText(buffer); }
      } else {
        rawData = parseAsText(buffer);
      }
    }
  } catch (err) {
    return { success: false, error: 'PARSE_ERROR', message: '文件解析失败：' + err.message };
  }
  
  if (!rawData || rawData.length < 2) {
    return { success: false, error: 'NO_DATA', message: '文件中没有足够的数据' };
  }
  
  const headers = rawData[0].map(h => trim(String(h || '')));
  const fields = detectFields(headers);
  
  if (fields.date < 0 || fields.weight < 0) {
    return { success: false, error: 'FIELD_NOT_FOUND', message: '无法识别日期或体重列，请确保文件包含"日期"和"体重"相关列' };
  }
  
  const records = [];
  for (let i = 1; i < rawData.length; i++) {
    const row = rawData[i];
    if (!row || row.length === 0) continue;
    const normalized = normalizeRecord(row, fields);
    if (normalized) records.push(normalized);
  }
  
  const uniqueRecords = deduplicateRecords(records);
  
  const validRecords = uniqueRecords.filter(r => {
    const date = new Date(r.date);
    const now = new Date();
    const minDate = new Date(now.getFullYear() - 10, now.getMonth(), now.getDate());
    const maxDate = new Date(now.getFullYear() + 1, now.getMonth(), now.getDate());
    return date >= minDate && date <= maxDate;
  });
  
  return { success: true, data: validRecords, error: null, message: `成功导入 ${validRecords.length} 条记录` };
}

function impF(inp) {
  const file = inp.files[0];
  if (!file) return;
  
  // 添加文件类型检查
  const allowedTypes = ['.json', '.csv', '.xlsx', '.xls', '.et'];
  const fileName = file.name.toLowerCase();
  const hasValidExt = allowedTypes.some(ext => fileName.endsWith(ext));
  
  if (!hasValidExt) {
    toast('请选择有效的数据文件');
    inp.value = '';
    return;
  }
  
  const MAX_SIZE = 10 * 1024 * 1024;
  if (file.size > MAX_SIZE) {
    toast('文件过大，请选择小于 10MB 的文件');
    inp.value = '';
    return;
  }
  
  toast('正在解析文件...');
  
  const reader = new FileReader();
  const ext = file.name.split('.').pop().toLowerCase();
  
  reader.onload = function(e) {
    try {
      const result = importData(e.target.result, ext, file.name);
      
      if (result.success) {
        if (result.data.length === 0) {
          toast('未找到有效数据');
          return;
        }
        
        // 显示导入确认对话框
        const confirmed = confirm(`发现 ${result.data.length} 条有效记录，是否追加导入？`);
        if (confirmed) {
          const newRecords = result.data.map((r, i) => ({
            id: Date.now() + i,
            date: r.date + 'T08:00:00.000Z',
            w: db.pf.u === 'jin' ? r.weight / 2 : r.weight,
            tag: r.tag || '',
            note: r.note || ''
          }));
          
          db.recs = [...db.recs, ...newRecords];
          ST.s(db);
          
          // 重新渲染页面而非刷新
          if ($('#vT').classList.contains('on')) {
            renderT();
          } else if ($('#vH').classList.contains('on')) {
            // 首页也需要更新
            renderH();
          }
          
          toast(`成功导入 ${result.data.length} 条记录`);
        }
      } else {
        toast(result.message || '导入失败');
      }
    } catch (err) {
      console.error('导入错误:', err);
      toast('导入过程出错：' + (err.message || '未知错误'));
    }
    
    inp.value = '';
  };
  
  reader.onerror = function() {
    toast('文件读取失败，请检查文件是否损坏');
    inp.value = '';
  };
  
  reader.onabort = function() {
    toast('文件读取被中断');
    inp.value = '';
  };
  
  if (ext === 'json') {
    reader.readAsText(file, 'utf-8');
  } else {
    reader.readAsArrayBuffer(file);
  }
}
